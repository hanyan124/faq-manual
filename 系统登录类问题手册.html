<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录类问题手册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 20px; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .toolbar button { padding: 8px 16px; border: 2px solid white; background: rgba(255,255,255,0.2); color: white; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; }
        .toolbar button:hover, .toolbar button.active { background: white; color: #667eea; }
        .search-box { max-width: 600px; margin: 0 auto 20px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px 15px 50px; border: none; border-radius: 50px; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); outline: none; transition: all 0.3s ease; -webkit-appearance: none; appearance: none; }
        .search-box input:focus { box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(-2px); }
        .search-box .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        .module-filter { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .module-filter button { padding: 8px 20px; border: 2px solid white; background: rgba(255,255,255,0.2); color: white; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; }
        .module-filter button:hover, .module-filter button.active { background: white; color: #667eea; }
        .faq-list { display: flex; flex-direction: column; gap: 15px; }
        .faq-item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; position: relative; }
        .faq-item:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .faq-item.pinned { border-left: 4px solid #ffd700; }
        .faq-header { padding: 20px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: background 0.3s ease; }
        .faq-header:hover { background: #f8f9ff; }
        .module-tag { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
        .faq-question { flex: 1; font-size: 1rem; font-weight: 600; color: #333; }
        .faq-toggle { width: 30px; height: 30px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #667eea; transition: all 0.3s ease; flex-shrink: 0; }
        .faq-item.active .faq-toggle { transform: rotate(180deg); }
        .faq-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .faq-actions button { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; transition: background 0.2s; }
        .faq-actions button:hover { background: #e0e0e0; }
        .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease; }
        .faq-item.active .faq-content { max-height: 5000px; }
        .faq-answer { padding: 0 25px 25px 70px; color: #555; line-height: 1.8; font-size: 0.95rem; }
        .faq-answer p { margin-bottom: 10px; }
        .faq-answer ol, .faq-answer ul { margin-left: 20px; margin-bottom: 10px; }
        .faq-answer li { margin-bottom: 5px; }
        .faq-images { margin-top: 15px; padding: 15px; background: #f8f9ff; border-radius: 8px; }
        .faq-images-title { font-size: 0.9rem; font-weight: 600; color: #667eea; margin-bottom: 10px; }
        .faq-images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .faq-images-grid img { width: 100%; border-radius: 6px; cursor: pointer; transition: transform 0.3s ease; border: 1px solid #e0e0e0; }
        .faq-images-grid img:hover { transform: scale(1.02); }
        .highlight { background: #fff3cd; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
        .no-results { text-align: center; padding: 40px; color: white; font-size: 1.1rem; display: none; }
        .stats { text-align: center; color: white; margin-bottom: 20px; font-size: 0.95rem; opacity: 0.8; }
        .img-viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .img-viewer-overlay.active { display: flex; }
        .img-viewer-overlay img { max-width: 90%; max-height: 90vh; object-fit: contain; }
        .img-viewer-close { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; background: none; border: none; }
        .img-viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 3rem; color: white; cursor: pointer; background: rgba(255,255,255,0.2); border: none; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .img-viewer-nav.prev { left: 20px; }
        .img-viewer-nav.next { right: 20px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; }
        .modal h2 { margin-bottom: 20px; color: #333; font-size: 1.4rem; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: #999; cursor: pointer; background: none; border: none; }
        .modal-close:hover { color: #333; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; -webkit-appearance: none; appearance: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { min-height: 120px; resize: vertical; font-family: inherit; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-danger:hover { background: #ff5252; }
        .login-status { display: flex; align-items: center; gap: 10px; color: white; font-size: 0.9rem; }
        .login-status span { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }
        .dialog-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; display: none; transition: transform 0.3s; }
        .dialog-btn:hover { transform: scale(1.1); }
        .dialog-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; align-items: center; justify-content: center; }
        .dialog-container.active { display: flex; }
        .dialog-box { background: white; border-radius: 16px; width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .dialog-box .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px 16px 0 0; text-align: center; }
        .dialog-box .header h1 { font-size: 1.5rem; }
        .dialog-box .header p { font-size: 0.9rem; opacity: 0.9; }
        .dialog-box .content { padding: 20px; }
        .dialog-close { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: white; cursor: pointer; background: none; border: none; z-index: 10; }
        .dialog-close:hover { opacity: 0.8; }
        .dialog-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #f8f9ff; border-bottom: 1px solid #eee; }
        .dialog-header-bar span { font-size: 0.85rem; color: #667eea; font-weight: 600; }
        .dialog-header-bar button { background: none; border: none; color: #667eea; cursor: pointer; font-size: 0.85rem; }
        .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 8px; display: none; }
        .ai-analyze-btn { background: linear-gradient(135deg, #00c9ff 0%, #92fe9d 100%) !important; border-color: white; }
        .ai-analyze-btn:hover, .ai-analyze-btn.active { background: white !important; color: #00c9ff !important; }
        .ai-result { margin-top: 20px; }
        .ai-result-item { background: #f8f9ff; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #667eea; }
        .ai-result-score { font-size: 0.85rem; color: #667eea; margin-bottom: 8px; font-weight: 600; }
        .ai-result-title { font-size: 1rem; font-weight: 600; color: #333; margin-bottom: 10px; }
        .ai-result-section { margin-bottom: 10px; }
        .ai-result-section h4 { font-size: 0.9rem; color: #555; margin-bottom: 5px; }
        .ai-result-section p { font-size: 0.9rem; color: #666; line-height: 1.6; }
        .ai-loading { text-align: center; padding: 20px; color: #667eea; }
        .ai-no-match { text-align: center; padding: 30px; color: #999; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { padding: 25px 15px; margin-bottom: 15px; }
            .header h1 { font-size: 1.6rem; }
            .header p { font-size: 0.95rem; }
            .toolbar { gap: 8px; margin-bottom: 15px; }
            .toolbar button { padding: 10px 18px; font-size: 0.95rem; min-height: 44px; }
            .search-box { margin-bottom: 15px; }
            .search-box input { padding: 12px 16px 12px 44px; font-size: 1rem; border-radius: 25px; }
            .search-box .search-icon { left: 14px; font-size: 1.1rem; }
            .module-filter { gap: 8px; margin-bottom: 20px; }
            .module-filter button { padding: 8px 14px; font-size: 0.85rem; min-height: 36px; }
            .faq-item { border-radius: 10px; }
            .faq-header { padding: 16px; gap: 10px; }
            .faq-question { font-size: 0.95rem; line-height: 1.5; }
            .faq-toggle { width: 28px; height: 28px; font-size: 1rem; }
            .faq-actions button { font-size: 1.1rem; padding: 6px; min-width: 32px; min-height: 32px; }
            .faq-answer { padding: 0 16px 16px 16px; font-size: 0.92rem; line-height: 1.7; }
            .faq-answer ol, .faq-answer ul { margin-left: 16px; }
            .module-tag { font-size: 0.75rem; padding: 3px 10px; }
            .faq-images-grid { grid-template-columns: 1fr; }
            .stats { font-size: 0.9rem; margin-bottom: 15px; }
            .modal { width: 95%; padding: 20px; border-radius: 12px; }
            .modal h2 { font-size: 1.2rem; }
            .form-group input, .form-group select, .form-group textarea { padding: 12px 14px; font-size: 1rem; min-height: 44px; }
            .form-group textarea { min-height: 100px; }
            .btn { padding: 12px 20px; font-size: 1rem; min-height: 44px; }
            .dialog-box { width: 95%; max-height: 92vh; border-radius: 12px; }
            .dialog-box .header { padding: 15px; }
            .dialog-box .header h1 { font-size: 1.3rem; }
            .dialog-box .content { padding: 15px; }
            .login-status { flex-wrap: wrap; justify-content: center; }
            .ai-result-item { padding: 15px; }
            .ai-result-title { font-size: 0.95rem; }
            .no-results { padding: 30px 15px; font-size: 1rem; }
        }
        @media (max-width: 380px) {
            .header h1 { font-size: 1.4rem; }
            .toolbar button { padding: 8px 14px; font-size: 0.85rem; }
            .faq-header { padding: 14px; }
            .faq-question { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>系统登录类问题手册</h1>
            <p>快速查找登录常见问题的解决方案</p>
        </div>
        <div class="toolbar" id="toolbar">
            <div id="adminControls" style="display:none;">
                <button onclick="openAddModal()">+ 新增问题</button>
                <button onclick="exportData()">导出数据</button>
                <button onclick="document.getElementById('importFile').click()">导入数据</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
                <button onclick="resetToDefault()">恢复默认</button>
            </div>
            <button class="ai-analyze-btn" onclick="openAiAnalyzeModal()">AI智能分析</button>
            <button onclick="openDialog()">对话框模式</button>
            <div class="login-status" id="loginStatus">
                <span id="loginStatusText">未登录</span>
                <button id="loginBtn" onclick="openLoginModal()">管理员登录</button>
                <button id="logoutBtn" onclick="logout()" style="display:none;">退出登录</button>
            </div>
        </div>
        <div class="search-box">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="searchInput" placeholder="搜索问题关键词...">
        </div>
        <div class="module-filter" id="moduleFilter">
            <button class="active" data-module="all">全部</button>
            <button data-module="网络连接">网络连接</button>
            <button data-module="登录失败">登录失败</button>
            <button data-module="系统安装">系统安装</button>
            <button data-module="权限设置">权限设置</button>
        </div>
        <div class="stats" id="stats">共 5 个问题</div>
        <div class="faq-list" id="faqList"></div>
        <div class="no-results" id="noResults">没有找到匹配的问题</div>
    </div>

    <button class="dialog-btn" id="dialogBtn" onclick="openDialog()" title="打开手册">&#128214;</button>

    <div class="dialog-container" id="dialogContainer">
        <div class="dialog-box">
            <button class="dialog-close" onclick="closeDialog()">&times;</button>
            <div class="header">
                <h1>系统登录类问题手册</h1>
                <p>快速查找登录常见问题的解决方案</p>
            </div>
            <div class="dialog-header-bar">
                <span>对话框模式</span>
                <button onclick="closeDialog()">关闭</button>
            </div>
            <div class="content">
                <div class="search-box" style="margin-bottom:15px;">
                    <span class="search-icon">&#128269;</span>
                    <input type="text" id="dialogSearchInput" placeholder="搜索问题关键词...">
                </div>
                <div class="module-filter" id="dialogModuleFilter" style="margin-bottom:15px;">
                    <button class="active" data-module="all">全部</button>
                    <button data-module="网络连接">网络连接</button>
                    <button data-module="登录失败">登录失败</button>
                    <button data-module="系统安装">系统安装</button>
                    <button data-module="权限设置">权限设置</button>
                </div>
                <div class="faq-list" id="dialogFaqList"></div>
                <div class="no-results" id="dialogNoResults" style="color:#667eea; display:none;">没有找到匹配的问题</div>
            </div>
        </div>
    </div>

    <div class="img-viewer-overlay" id="imgViewer" onclick="closeImgViewer()">
        <button class="img-viewer-close" onclick="closeImgViewer(); event.stopPropagation();">&times;</button>
        <button class="img-viewer-nav prev" onclick="navImg(-1); event.stopPropagation();">&#8249;</button>
        <img id="viewerImg" src="" alt="">
        <button class="img-viewer-nav next" onclick="navImg(1); event.stopPropagation();">&#8250;</button>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <button class="modal-close" onclick="closeAddModal()">&times;</button>
            <h2 id="modalTitle">新增问题</h2>
            <div class="form-group">
                <label>所属模块</label>
                <select id="faqModule">
                    <option value="网络连接">网络连接</option>
                    <option value="登录失败">登录失败</option>
                    <option value="系统安装">系统安装</option>
                    <option value="权限设置">权限设置</option>
                </select>
            </div>
            <div class="form-group">
                <label>问题标题</label>
                <input type="text" id="faqQuestion" placeholder="请输入问题标题">
            </div>
            <div class="form-group">
                <label>问题答案（支持HTML）</label>
                <textarea id="faqAnswer" placeholder="请输入问题答案，支持HTML标签"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="saveFAQ()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="modal-close" onclick="closeLoginModal()">&times;</button>
            <h2>管理员登录</h2>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="adminPassword" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div class="error-msg" id="loginError">密码错误</div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeLoginModal()">取消</button>
                <button class="btn btn-primary" onclick="doLogin()">登录</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="aiAnalyzeModal">
        <div class="modal">
            <button class="modal-close" onclick="closeAiAnalyzeModal()">&times;</button>
            <h2>AI智能分析</h2>
            <p style="font-size:0.85rem;color:#999;margin-bottom:15px;">描述您遇到的问题，AI将分析并匹配最相关的问题及解决方案</p>
            <div class="form-group">
                <label>问题描述</label>
                <textarea id="aiUserQuestion" rows="4" placeholder="请详细描述您遇到的问题，例如：我打开车间管理系统时提示网络异常..."></textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeAiAnalyzeModal()">关闭</button>
                <button class="btn btn-primary" onclick="doAiAnalyze()">AI分析</button>
            </div>
            <div id="aiResultArea"></div>
        </div>
    </div>

    <script>
        // ============================================
        // 钉钉群应用部署配置
        // 部署到钉钉时，请修改以下配置
        // ============================================
        var dingtalkConfig = {
            // 资源基础URL（用于图片等静态资源）
            // 示例: 'https://your-cdn.com/faq-images/'
            baseUrl: '',
            // 是否开启钉钉调试模式
            debug: false
        };

        // 辅助函数：确保链接以 http/https/dingtalk/dtmd 开头
        function normalizeUrl(url) {
            if (!url || url === '') return url;
            if (/^(https?|dingtalk|dtmd):\/\//i.test(url)) {
                return url;
            }
            // 相对路径，拼接基础URL
            var base = dingtalkConfig.baseUrl || '';
            if (base && !base.endsWith('/')) base += '/';
            return base + url;
        }

        var defaultFaqData = [
            {
                module: "网络连接",
                question: "打开老车间管理系统时，弹窗提示\"网络异常或非本厂区安装包，请检查确认\"（老系统）",

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightText(text, term) {
            if (!term) return text;
            var regex = new RegExp('(' + escapeHtml(term) + ')', 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function sortData() {
            faqData.sort(function(a, b) {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });
        }

        function renderFAQ(isDialog) {
            var listId = isDialog ? 'dialogFaqList' : 'faqList';
            var noResultsId = isDialog ? 'dialogNoResults' : 'noResults';
            var statsId = isDialog ? null : 'stats';
            var mod = isDialog ? dialogActiveModule : activeModule;
            var term = isDialog ? dialogSearchTerm : searchTerm;

            var faqList = document.getElementById(listId);
            var noResults = document.getElementById(noResultsId);
            var filtered = faqData.slice();

            if (mod !== 'all') {
                filtered = filtered.filter(function(item) { return item.module === mod; });
            }
            if (term) {
                var t = term.toLowerCase();
                filtered = filtered.filter(function(item) {
                    return item.question.toLowerCase().includes(t) || item.answer.toLowerCase().includes(t) || item.module.toLowerCase().includes(t);
                });
            }

            if (statsId) {
                document.getElementById(statsId).textContent = '共 ' + filtered.length + ' 个问题';
            }
            if (filtered.length === 0) {
                faqList.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';
            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var item = filtered[i];
                var idx = faqData.indexOf(item);
                var questionHtml = item.question.replace(/\n/g, '<br>');
                if (term) { questionHtml = highlightText(questionHtml, term); }
                html += '<div class="faq-item ' + (item.pinned ? 'pinned' : '') + '" data-index="' + idx + '">';
                html += '<div class="faq-header">';
                html += '<span class="module-tag">' + item.module + '</span>';
                html += '<span class="faq-question">' + questionHtml + '</span>';
                if (isLoggedIn) {
                    html += '<div class="faq-actions">';
                    html += '<button onclick="togglePin(' + idx + '); event.stopPropagation();" title="' + (item.pinned ? '取消置顶' : '置顶') + '">' + (item.pinned ? '&#9733;' : '&#9734;') + '</button>';
                    html += '<button onclick="editFAQ(' + idx + '); event.stopPropagation();" title="编辑">&#9998;</button>';
                    html += '<button onclick="deleteFAQ(' + idx + '); event.stopPropagation();" title="删除">&#128465;</button>';
                    html += '</div>';
                }
                html += '<span class="faq-toggle">&#9660;</span>';
                html += '</div>';
                html += '<div class="faq-content">';
                html += '<div class="faq-answer">' + item.answer;
                if (item.images && item.images.length > 0) {
                    html += '<div class="faq-images">';
                    html += '<div class="faq-images-title">&#128247; 操作截图</div>';
                    html += '<div class="faq-images-grid">';
                    for (var j = 0; j < item.images.length; j++) {
                        html += '<img src="' + normalizeUrl(item.images[j]) + '" alt="截图' + (j+1) + '" onclick="openImgViewer(this.src)">';
                    }

                }
                html += '</div></div></div>';
            }

            attachEventListeners(isDialog);
        }

            for (var i = 0; i < allImgs.length; i++) {
                if (allImgs[i].src === currentSrc) { currentIdx = i; break; }
            }
            if (currentIdx >= 0) {
                var newIdx = currentIdx + direction;
                if (newIdx < 0) newIdx = allImgs.length - 1;
                if (newIdx >= allImgs.length) newIdx = 0;
                document.getElementById('viewerImg').src = allImgs[newIdx].src;
            }

        function tokenize(text) {
            var clean = text.toLowerCase().replace(/<[^>]*>/g, '').replace(/[\s\n\r\t]+/g, ' ').trim();
            var tokens = clean.split(/[^\u4e00-\u9fa5a-zA-Z0-9]+/);
            var stopWords = ['的', '了', '是', '在', '我', '有', '和', '就', '不', '人', '都', '一', '一个', '上', '也', '很', '到', '说', '要', '去', '你', '会', '着', '没有', '看', '好', '自己', '这', '那', '个', '为', '可以', '吗', '什么', '怎么', '还是', '或者', '以及', '或者', '但是', '然后', '需要', '进行', '使用', '通过', '关于', '对于', '如何', '为什么', '是否', '无法', '不能', '不能', '提示', '出现', '报错', '错误', '问题', '原因', '解决', '方案', '办法'];
            return tokens.filter(function(t) { return t.length > 1 && stopWords.indexOf(t) < 0; });
        }

        function calculateSimilarity(userInput, faqItem) {
            var userTokens = tokenize(userInput);
            var questionTokens = tokenize(faqItem.question);
            var answerTokens = tokenize(faqItem.answer);
            var score = 0;
            userTokens.forEach(function(token) {
                questionTokens.forEach(function(qt) { if (qt.indexOf(token) >= 0 || token.indexOf(qt) >= 0) score += 3; });
                answerTokens.forEach(function(at) { if (at.indexOf(token) >= 0 || token.indexOf(at) >= 0) score += 1; });
            });
            if (faqItem.question.toLowerCase().indexOf(userInput.toLowerCase()) >= 0) score += 10;
            return score;
        }

        function doAiAnalyze() {
            var userQuestion = document.getElementById('aiUserQuestion').value.trim();
            if (!userQuestion) { alert('请描述您遇到的问题'); return; }
            var resultArea = document.getElementById('aiResultArea');
            resultArea.innerHTML = '<div class="ai-loading">AI正在分析中...</div>';
            setTimeout(function() {
                var results = [];
                faqData.forEach(function(item, idx) {
                    var score = calculateSimilarity(userQuestion, item);
                    if (score > 0) results.push({ item: item, score: score, index: idx });
                });
                results.sort(function(a, b) { return b.score - a.score; });
                if (results.length === 0) {
                    resultArea.innerHTML = '<div class="ai-no-match">未找到匹配的问题，建议手动搜索或联系管理员添加新问题。</div>';
                    return;
                }
                var topResults = results.slice(0, 3);
                var html = '<div class="ai-result"><h3 style="margin-bottom:15px;color:#333;">AI分析结果</h3>';
                topResults.forEach(function(result) {
                    var item = result.item;
                    var matchPercent = Math.min(Math.round((result.score / 15) * 100), 100);
                    html += '<div class="ai-result-item">';
                    html += '<div class="ai-result-score">匹配度: ' + matchPercent + '%</div>';
                    html += '<div class="ai-result-title">【' + item.module + '】' + item.question + '</div>';
                    html += '<div class="ai-result-section"><h4>问题原因与解决方案</h4><p>' + item.answer + '</p></div>';
                    html += '</div>';
                });
                html += '</div>';
                resultArea.innerHTML = html;
            }, 800);
        }
